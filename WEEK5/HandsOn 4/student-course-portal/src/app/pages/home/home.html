<div class="home-container">

    <h1>{{ portalName }}</h1>

    <p class="subtitle">
        Manage your courses, enrollment and academic progress.
    </p>

    <div class="card-container">

        <div class="card">
            <h2>📚</h2>
            <h3>Courses Available</h3>
            <p>12</p>
        </div>

        <div class="card">
            <h2>✅</h2>
            <h3>Enrolled</h3>
            <p>3</p>
        </div>

        <div class="card">
            <h2>🏆</h2>
            <h3>Current GPA</h3>
            <p>3.8</p>
        </div>

    </div>

    <div class="action-section">

        <button
            class="enroll-btn"
            (click)="onEnrollClick()"
            [disabled]="!isPortalActive">
            Enroll Now
        </button>

       <p class="message">
    {{ message }}
</p>

        <div class="search-section">

            <input
                type="text"
                placeholder="🔍 Search Courses..."
                [(ngModel)]="searchTerm">

            <p>
                Searching for:
                <strong>{{ searchTerm }}</strong>
            </p>

        </div>

    </div>

</div>
