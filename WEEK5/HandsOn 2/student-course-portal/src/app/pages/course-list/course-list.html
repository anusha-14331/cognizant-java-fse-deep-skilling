<h1 class="page-title">📚 Available Courses</h1>

<div class="course-container">

    <app-course-card

        *ngFor="let c of courses"

        [course]="c"

        (enrollRequested)="onEnroll($event)">

    </app-course-card>

</div>

<p class="selected-course" *ngIf="selectedCourseId">

    ✅ Selected Course ID:
    {{ selectedCourseId }}

</p>
