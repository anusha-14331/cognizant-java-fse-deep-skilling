<div class="course-card">

    <h1>📘</h1>

    <h2>{{ course.name }}</h2>

    <p><strong>Course Code</strong></p>

    <p>{{ course.code }}</p>

    <p><strong>Credits</strong></p>

    <p>{{ course.credits }}</p>

    <button

        class="enroll-button"

        (click)="enroll()">

        Enroll

    </button>

</div>
