<h1 class="title">🎓 Student Enrollment Form</h1>

<form
    #enrollForm="ngForm"
    (ngSubmit)="onSubmit(enrollForm)">

    <!-- Student Name -->

<label>Student Name</label>

<input
    type="text"
    name="studentName"
    [(ngModel)]="studentName"
    required
    minlength="3"
    #nameCtrl="ngModel">
<span
    *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']"
    style="color:red;">

    Name is required

</span>

<span
    *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']"
    style="color:red;">

    Name must be at least 3 characters

</span>
    <br><br>

    <!-- Email -->

  <label>Email</label>

<input
    type="email"
    name="studentEmail"
    [(ngModel)]="studentEmail"
    required
    email
    #emailCtrl="ngModel">
<span
    *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']"
    style="color:red;">

    Email is required

</span>

<span
    *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']"
    style="color:red;">

    Enter a valid email

</span>
    <br><br>

    <!-- Course ID -->

   <label>Course ID</label>

<input
    type="number"
    name="courseId"
    [(ngModel)]="courseId"
    required
    #courseCtrl="ngModel">
<span
    *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']"
    style="color:red;">

    Course ID is required

</span>
    <br><br>

    <!-- Semester -->

 <label>Preferred Semester</label>

<select
    name="preferredSemester"
    [(ngModel)]="preferredSemester"
    required
    #semesterCtrl="ngModel">

    <option value="">Select</option>
    <option value="Odd">Odd</option>
    <option value="Even">Even</option>

</select>
<span
    *ngIf="semesterCtrl.touched && semesterCtrl.errors?.['required']"
    style="color:red;">

    Please select a semester

</span>
    <br><br>

    <!-- Checkbox -->
<label>

<div class="checkbox">

    <input
        type="checkbox"
        name="agreeToTerms"
        [(ngModel)]="agreeToTerms"
        required
        #termsCtrl="ngModel">

    <label>I agree to the Terms & Conditions</label>

</div>

</label>
<span
    *ngIf="termsCtrl.touched && termsCtrl.errors?.['required']"
    style="color:red;">

    You must agree to the Terms & Conditions

</span>
    <br><br>

    <button
        type="submit"
        [disabled]="enrollForm.invalid">

        Submit

    </button>
    <div
    class="success-message"
    *ngIf="submitted">

    ✅ Enrollment request submitted successfully!

</div>
<button
    type="button"
    (click)="enrollForm.resetForm()">

    Reset

</button>

</form>
